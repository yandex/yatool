<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ya log viewer</title>
    <style>
    :root { color-scheme: light dark; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    .topbar {
      height: auto;
      min-height: 56px;
      box-sizing: border-box;
      padding: 8px 12px;
      border-bottom: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fff;
    }

    .topbar-main {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .topbar-title {
      font-weight: 700;
      white-space: nowrap;
    }

    .topbar-stats {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .toolbar-group label {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .toolbar-label {
      font-weight: 600;
      margin-right: 2px;
    }

    .multi-select {
      position: relative;
    }

    .multi-select summary {
      min-width: 128px;
      max-width: 260px;
      box-sizing: border-box;
      padding: 6px 28px 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      list-style: none;
    }

    .multi-select summary::-webkit-details-marker {
      display: none;
    }

    .multi-select summary::after {
      content: '▾';
      position: absolute;
      right: 10px;
      top: 7px;
      font-size: 11px;
      opacity: 0.7;
    }

    .multi-select[open] summary::after {
      content: '▴';
    }

    .multi-select-menu {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 30;
      min-width: 220px;
      max-height: 320px;
      overflow: auto;
      box-sizing: border-box;
      padding: 6px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .multi-select-option {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 6px;
      border-radius: 4px;
    }

    .multi-select-option:hover {
      background: rgba(125, 125, 125, 0.08);
    }

    .multi-select-empty {
      padding: 6px;
    }

    .multi-select-clear {
      width: 100%;
      margin-top: 4px;
      text-align: center;
    }

    .toolbar input[type="text"],
    .toolbar input[type="datetime-local"] {
      width: 180px;
      box-sizing: border-box;
      padding: 5px 7px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .toolbar .search-input {
      width: 260px;
    }

    .search-box {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .search-box .search-input {
      padding-right: 28px;
    }

    .search-clear {
      position: absolute;
      right: 4px;
      width: 22px;
      height: 22px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: inherit;
      opacity: 0.65;
      line-height: 20px;
      font-size: 18px;
    }

    .search-clear:hover {
      opacity: 1;
      background: rgba(125, 125, 125, 0.12);
    }

    .toolbar .time-input {
      width: 190px;
    }

    .stage-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-sizing: border-box;
      padding: 8px 10px;
      border: 1px solid #d7e3ff;
      border-radius: 6px;
      background: #f4f7ff;
    }

    .stage-banner-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .filter-value-selector {
      position: relative;
      display: flex;
      align-items: stretch;
      gap: 4px;
    }

    .filter-value-selector-op {
      width: 48px;
      padding: 5px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }

    .filter-value-selector-combobox {
      min-width: 240px;
      max-width: 420px;
      min-height: 31px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      padding: 2px 4px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      white-space: normal;
    }

    .filter-value-selector-level .filter-value-selector-combobox {
      min-width: 140px;
      max-width: 220px;
    }

    .filter-value-selector-combobox input[type="text"] {
      width: 120px;
      min-width: 80px;
      flex: 1;
      padding: 3px 4px;
      border: 0;
      outline: 0;
      background: transparent;
    }

    .filter-value-chip {
      max-width: 220px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      border-radius: 99px;
      font-size: 12px;
    }

    .filter-value-chip span:first-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .filter-value-selector-menu {
      position: absolute;
      top: calc(100% + 4px);
      left: 52px;
      z-index: 30;
      min-width: 320px;
      max-width: 560px;
      max-height: 320px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-sizing: border-box;
      padding: 6px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .filter-value-selector-level .filter-value-selector-menu {
      min-width: 220px;
    }

    .filter-value-selector-options {
      min-height: 0;
      overflow: auto;
    }

    .filter-value-selector-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 5px 6px;
      border-radius: 4px;
      cursor: pointer;
    }

    .filter-value-selector-option:hover {
      background: rgba(125, 125, 125, 0.08);
    }

    .filter-value-selector-option span:first-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .filter-value-selector-empty {
      padding: 6px;
    }

    .filter-value-selector-clear {
      width: 100%;
      margin-top: 4px;
      text-align: center;
      flex: 0 0 auto;
    }

    .container {
      height: calc(100vh - var(--topbar-height, 104px));
      width: 100vw;
      overflow: hidden;
    }

    .main {
      display: grid;
      grid-template-rows: minmax(0, 1fr) 44px;
      height: 100%;
      width: 100%;
    }

    .list {
      overflow: auto;
      min-height: 0;
      width: 100%;
    }

    .pager {
      border-top: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      box-sizing: border-box;
      height: 44px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
    }

    th,
    td {
      border-bottom: 1px solid #eee;
      padding: 6px 8px;
      text-align: left;
      vertical-align: top;
    }

    tr:hover {
      background: rgba(125, 125, 125, 0.08);
      cursor: pointer;
    }

    .level-ERROR,
    .level-FATAL,
    .level-CRITICAL {
      color: #b00020;
      font-weight: 600;
    }

    .row-selected {
      background: rgba(0, 120, 215, 0.10);
    }

    .line-cell {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      text-align: left;
    }

    .table-filter-value {
      max-width: 100%;
      display: inline-block;
      box-sizing: border-box;
      padding: 2px 5px;
      border: 1px solid transparent;
      border-radius: 4px;
      background: transparent;
      color: inherit;
      font: inherit;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: top;
    }

    .table-filter-value:hover {
      border-color: #c9d8ff;
      background: #f4f7ff;
      text-decoration: underline;
    }

    .table-filter-value-active {
      border-color: #7c9cff;
      background: #eef3ff;
      font-weight: 600;
    }

    .inline-link-button {
      padding: 0;
      border: 0;
      background: transparent;
      color: #2456c5;
      font: inherit;
      text-decoration: underline;
    }

    .inline-link-button:hover {
      color: #123a91;
    }

    .details {
      position: fixed;
      top: var(--topbar-height, 104px);
      right: 0;
      width: min(760px, 100%);
      height: calc(100vh - var(--topbar-height, 104px));
      border-left: 1px solid #ddd;
      background: #fff;
      color: inherit;
      overflow: auto;
      box-shadow: -3px 0 6px rgba(0,0,0,0.05);
      z-index: 20;
    }

    .details .inner {
      padding: 12px;
    }

    .details-section-title {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-top: 10px;
    }

    .details-stage-list {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      margin-top: 4px;
    }

    .stage-tree {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 6px;
      margin-top: 4px;
    }

    .stage-button {
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 100%;
      text-align: left;
    }

    .stage-tree-item {
      position: relative;
      width: fit-content;
      max-width: calc(100% - 8px);
      border-left: 4px solid #7c9cff;
      background: #fbfcff;
      box-sizing: border-box;
    }

    .stage-button-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stage-depth-badge {
      flex: 0 0 auto;
      min-width: 24px;
      box-sizing: border-box;
      padding: 1px 5px;
      border-radius: 99px;
      background: rgba(0, 0, 0, 0.06);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .pretty-log {
      margin-top: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    .pretty-log-block {
      margin: 0 0 8px;
      white-space: pre-wrap;
      word-break: break-word;
      background: #f7f7f7;
      padding: 10px;
      border: 1px solid #eee;
      border-radius: 6px;
    }

    .pretty-log-structured {
      background: #fbfbff;
      border-left: 3px solid #7c9cff;
    }

    .muted {
      opacity: 0.7;
    }

    .chip {
      display: inline-block;
      padding: 2px 6px;
      border: 1px solid #ddd;
      border-radius: 99px;
      margin: 2px 4px 2px 0;
      font-size: 12px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input[type="text"] {
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 6px 10px;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
    }

    button[disabled] {
      opacity: 0.6;
      cursor: default;
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .container {
        height: auto;
        min-height: calc(100vh - var(--topbar-height, 140px));
      }

      .toolbar {
        align-items: flex-start;
      }

      .toolbar-group {
        flex-wrap: wrap;
      }

      .toolbar input[type="text"],
      .toolbar input[type="datetime-local"],
      .toolbar .search-input,
      .toolbar .time-input {
        width: 160px;
      }

      .filter-value-selector {
        width: 100%;
      }

      .filter-value-selector-combobox {
        min-width: 0;
        flex: 1;
      }

      .filter-value-selector-menu {
        left: 0;
        min-width: min(320px, 100vw - 24px);
      }
    }
  </style>

    <script type="module" crossorigin src="/assets/app.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
  </html>
